services:
  redis:
    image: redis:7.4-alpine
    container_name: formulas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - formulas-net

  mysql:
    image: mysql:8.4
    container_name: formulas-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - formulas-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  formulas-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formulas-app
    restart: unless-stopped
    init: true
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-formulas}
      MYSQL_USER: ${MYSQL_USER:-formulas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-formulas}
      PARSER_INTERVAL_SECONDS: ${PARSER_INTERVAL_SECONDS:-300}
      API_MODE: ${API_MODE:-batch}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME:-drive-file-events}
      DRIVE_WEBHOOK_TOKEN: ${DRIVE_WEBHOOK_TOKEN:-}
      DRIVE_WEBHOOK_ADDRESS: ${DRIVE_WEBHOOK_ADDRESS:-}
      DRIVE_FOLDER_ID: ${DRIVE_FOLDER_ID:-}
      DRIVE_TEMP_DIR: ${DRIVE_TEMP_DIR:-/tmp/formulas-drive}
      DRIVE_SYNC_MAX_FILES: ${DRIVE_SYNC_MAX_FILES:-200}
      DRIVE_WATCH_TTL_SECONDS: ${DRIVE_WATCH_TTL_SECONDS:-86400}
      DRIVE_WATCH_AUTO_RENEW_ENABLED: ${DRIVE_WATCH_AUTO_RENEW_ENABLED:-true}
      DRIVE_WATCH_RENEW_BEFORE_SECONDS: ${DRIVE_WATCH_RENEW_BEFORE_SECONDS:-900}
      DRIVE_WATCH_CHECK_INTERVAL_SECONDS: ${DRIVE_WATCH_CHECK_INTERVAL_SECONDS:-60}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${GOOGLE_SERVICE_ACCOUNT_KEY_JSON:-}
      GOOGLE_DRIVE_SCOPES: ${GOOGLE_DRIVE_SCOPES:-https://www.googleapis.com/auth/drive.readonly}
    command:
      - /bin/sh
      - -lc
      - |
        echo "[formulas-app] Modo contínuo ativo. Intervalo: $${PARSER_INTERVAL_SECONDS}s"
        while true; do
          node dist/index.js || true
          sleep "$${PARSER_INTERVAL_SECONDS}"
        done
    volumes:
      - ./Output:/app/Output
    networks:
      - formulas-net

  formulas-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formulas-worker
    restart: unless-stopped
    init: true
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-formulas}
      MYSQL_USER: ${MYSQL_USER:-formulas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-formulas}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME:-drive-file-events}
      DRIVE_WEBHOOK_ADDRESS: ${DRIVE_WEBHOOK_ADDRESS:-}
      DRIVE_FOLDER_ID: ${DRIVE_FOLDER_ID:-}
      DRIVE_TEMP_DIR: ${DRIVE_TEMP_DIR:-/tmp/formulas-drive}
      DRIVE_SYNC_MAX_FILES: ${DRIVE_SYNC_MAX_FILES:-200}
      DRIVE_WATCH_TTL_SECONDS: ${DRIVE_WATCH_TTL_SECONDS:-86400}
      DRIVE_WATCH_AUTO_RENEW_ENABLED: ${DRIVE_WATCH_AUTO_RENEW_ENABLED:-true}
      DRIVE_WATCH_RENEW_BEFORE_SECONDS: ${DRIVE_WATCH_RENEW_BEFORE_SECONDS:-900}
      DRIVE_WATCH_CHECK_INTERVAL_SECONDS: ${DRIVE_WATCH_CHECK_INTERVAL_SECONDS:-60}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${GOOGLE_SERVICE_ACCOUNT_KEY_JSON:-}
      GOOGLE_DRIVE_SCOPES: ${GOOGLE_DRIVE_SCOPES:-https://www.googleapis.com/auth/drive.readonly}
    command:
      - node
      - dist/worker.js
    networks:
      - formulas-net

volumes:
  mysql_data:

networks:
  formulas-net:
    driver: bridge
